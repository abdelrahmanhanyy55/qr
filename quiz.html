<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOC Skill Gap assessment</title>
<style>
:root {
  --bg:#0f1724; --card:#0b1220; --accent:#00b4d8; --muted:#98a0b3; --success:#16a34a; --danger:#ef4444;
}
* { box-sizing:border-box; }
body { 
    margin:0; 
    font-family:Arial,sans-serif; 
    background:var(--bg); 
    color:#e6eef8; 
    display:flex; 
    justify-content:center; 
    align-items:center; 
    padding:24px; 
    min-height:100vh;
}
.container { 
    display:grid; 
    grid-template-columns:1fr 360px; 
    gap:16px; 
    width:100%; 
    max-width:920px; 
    background:var(--card); 
    border-radius:12px; 
    padding:18px; 
    box-shadow:0 10px 30px rgba(2,6,23,0.6); 
}
.quiz{padding:16px;}
h1{margin:0 0 8px 0;font-size:20px;}
.meta{color:var(--muted);font-size:13px;margin-bottom:12px;}
.card{background:rgba(255,255,255,0.02);border-radius:10px;padding:14px;margin-bottom:14px;}
.question{font-weight:600;margin-bottom:10px;}
.choices{display:flex;flex-direction:column;gap:8px;}
.choice{padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);cursor:pointer;background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.00));}
.choice:hover{transform:translateY(-2px);}
.choice.selected{outline:2px solid rgba(0,180,216,0.18);} 
.controls{display:flex;gap:8px;align-items:center;margin-top:12px;}
button{background:var(--accent);border:none;color:#042028;padding:10px 14px;border-radius:8px;font-weight:700;cursor:pointer;}
button[disabled]{opacity:0.45;cursor:not-allowed;}
.sidebar{padding:12px;display:flex;flex-direction:column;gap:12px;}
.stat{display:flex;justify-content:space-between;align-items:center;}
.timer{font-weight:800;font-size:20px;color:var(--accent);}
.progress{height:10px;background:rgba(255,255,255,0.03);border-radius:999px;overflow:hidden;}
.progress>span{display:block;height:100%;background:linear-gradient(90deg,var(--accent), #6dd3ff);width:0%;}
.results{text-align:center;}
.small{font-size:13px;color:var(--muted);}
.footer-note{font-size:12px;color:var(--muted);margin-top:8px;}

/* Logo Positioning (Position Fixed for guaranteed placement) */
.logo {
    position: fixed; /* Positions relative to the viewport/window */
    top: 24px;       
    right: 24px;     
    width: 140px;     
    height: auto;
    z-index: 100;    
}

@media(max-width:940px){
    .container{grid-template-columns:1fr; padding:12px;}
    .sidebar{order:2}
    /* Adjust logo position/size for smaller screens */
    .logo {
        top: 12px;
        right: 12px;
        width: 45px;
    }
}
</style>
</head>
<body>
<img src="its.png" alt="ITS Logo" class="logo">

<div class="container">
  <div class="quiz card" id="quizArea">
    <h1>SOC Skill Gap assessment</h1>
    <div class="meta">198 questions • time limit: 90 minutes</div>
    <div id="questionCard" class="card" aria-live="polite">
      <div class="question" id="qText">Loading…</div>
      <div class="choices" id="choices"></div>
      <div class="controls">
        <button id="nextBtn">Next</button>
        <div class="small" style="margin-left:8px">Question <span id="qIndex">0</span> / <span id="qTotal">0</span></div>
      </div>
    </div>
    <div id="endBlock" class="card" style="display:none">
      <div class="results" id="resultSummary"></div>
      <div style="margin-top:12px">
        </div>
    </div>
  </div>
  <aside class="sidebar card" aria-label="status panel">
    <div>
      <div class="stat"><div class="small">Time left</div><div class="timer" id="timeLeft">90:00</div></div>
      <div class="progress"><span id="timeProgress"></span></div>
    </div>
    
    <div>
      <div class="small">Question map</div>
      <div id="map" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px"></div>
    </div>
    
  </aside>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby3cb0GPBVrnnug-Obudwdr3Qayz1hEbhomS6A7GmUrSUSctjzsP0rawLr_I4QEKKOO/exec"; // Google Apps Script Web App URL (POST)
const TIME_LIMIT = 10 * 60; // 90 minutes in seconds

const QUESTIONS = [

{q:"SOC Scenario: An employee reports a suspicious email asking them to verify their login credentials using a link. What should you identify this as?",choices:["Phishing","DDoS attempt","System update","Credential caching"],answer:0},

{q:"SOC Scenario: Multiple failed login attempts are observed from a foreign IP address within seconds. What does this indicate?",choices:["Password reset","Brute-force attack","System maintenance","Normal user error"],answer:1},

{q:"SOC Scenario: You detect a sudden outbound traffic spike from an internal device to an unknown server. What is this most likely?",choices:["Normal cloud sync","Data exfiltration attempt","Routine backup","DNS resolution"],answer:1},

{q:"SOC Scenario: A critical server shows signs of encryption on multiple files. What attack is happening?",choices:["Ransomware","Phishing","SQL injection","DDoS"],answer:0},

{q:"SOC Scenario: A user claims their system is running slow, and unknown programs are auto-starting. What is likely the cause?",choices:["Malware infection","GPU overload","Network congestion","Incorrect OS update"],answer:0},

{q:"SOC Scenario: You find that firewall logs show repeated requests to unreachable internal hosts. What is this behavior?",choices:["Network scan / reconnaissance","File transfer","DNS query","Patch update"],answer:0},

{q:"SOC Scenario: SOC alerts show login at 3 AM from a country the employee has never visited. What is this?",choices:["Legitimate remote work","Impossible travel alert","DNS misconfiguration","Email sync"],answer:1},

{q:"SOC Scenario: You detect repeated SQL queries with strange characters like ' OR 1=1 -- . What is this?",choices:["Input sanitization test","SQL Injection attempt","Server backup","API timeout"],answer:1},

{q:"SOC Scenario: A device suddenly starts communicating with a known malicious C2 server. What does this indicate?",choices:["OS update","Command-and-control communication","VPN sync","DNS flush"],answer:1},

{q:"SOC Scenario: Your IDS reports hundreds of SYN packets but no ACK responses. What is this?",choices:["SYN flood attack","Normal handshake","ARP broadcast","VPN probing"],answer:0},

{q:"SOC Scenario: A user reports their files being replaced with .locked extensions. What attack is this?",choices:["Ransomware","Phishing","Brute force","Keylogging"],answer:0},

{q:"SOC Scenario: You detect a script that records keyboard input silently. What type of malware is this?",choices:["Keylogger","Worm","Rootkit","Spyware"],answer:0},

{q:"SOC Scenario: Logs show a user account accessing sensitive HR files without authorization. What is this?",choices:["Privilege misuse","System update","Backup verification","License sync"],answer:0},

{q:"SOC Scenario: A device keeps requesting the same DNS entry repeatedly and rapidly. What does this signal?",choices:["DNS tunneling","Cache warming","DHCP renewal","ARP request"],answer:0},

{q:"SOC Scenario: You detect multiple endpoint alerts showing the same malware moving laterally. What is happening?",choices:["Lateral movement","Port forwarding","Configuration sync","DHCP cycling"],answer:0},

{q:"SOC Scenario: Firewall logs show unusual outbound connections on port 4444. What does this suggest?",choices:["Reverse shell","Printer update","SSH maintenance","DHCP"],answer:0},

{q:"SOC Scenario: An attacker changes system logs to hide their activity. What attack stage is this?",choices:["Covering tracks","Reconnaissance","Delivery","Exploitation"],answer:0},

{q:"SOC Scenario: The SOC receives alerts for mass file deletion on a shared folder. What does this indicate?",choices:["Insider threat","Normal cleanup","Compression event","Patch rollback"],answer:0},

{q:"SOC Scenario: A critical system begins running unsigned executables. What is this likely?",choices:["Malicious execution","GPU update","Port negotiation","Cloud sync"],answer:0},

{q:"SOC Scenario: You detect abnormal PowerShell commands like Invoke-WebRequest pulling scripts. What does this mean?",choices:["Malicious PowerShell activity","Printer spooler error","User automation","Backup job"],answer:0}

];

let currentIndex = 0,
    score = 0,
    correct = 0,
    wrong = 0,
    selected = null,
    timerSeconds = TIME_LIMIT,
    timerInterval = null,
    total = QUESTIONS.length,
    answers = new Array(QUESTIONS.length).fill(null); // per-question answers

// --- State Management Functions ---

function saveState() {
    const state = {
        currentIndex,
        score,
        correct,
        wrong,
        timerSeconds,
        answers
    };
    sessionStorage.setItem('quizState', JSON.stringify(state));
}

function loadState() {
    const savedState = sessionStorage.getItem('quizState');
    if (savedState) {
        const state = JSON.parse(savedState);
        currentIndex   = state.currentIndex;
        score          = state.score;
        correct        = state.correct;
        wrong          = state.wrong;
        timerSeconds   = state.timerSeconds;
        answers        = state.answers || new Array(QUESTIONS.length).fill(null);
        return true;
    }
    return false;
}

function clearState() {
    sessionStorage.removeItem('quizState');
}

// --- Quiz Logic ---
function init() {
  if (loadState()) {
      console.log("State loaded. Resuming quiz.");
      document.getElementById('qTotal').textContent = total;
      renderQuestion(); 
      renderMap(); 
      startTimer();
  } else {
      console.log("No state found. Starting new quiz.");
      QUESTIONS.sort(()=>0.5 - Math.random());
      total = QUESTIONS.length;
      answers = new Array(total).fill(null);
      document.getElementById('qTotal').textContent = total;
      resetState(); 
      renderQuestion(); 
      renderMap(); 
      startTimer();
  }
}

function resetState() {
  currentIndex = 0;
  score        = 0;
  correct      = 0;
  wrong        = 0;
  selected     = null;
  timerSeconds = TIME_LIMIT;
  answers      = new Array(QUESTIONS.length).fill(null);

  document.getElementById('endBlock').style.display = 'none';
  document.getElementById('questionCard').style.display = 'block';
  clearState();
}

function startTimer() {
  updateTimeDisplay();
  timerInterval = setInterval(()=>{
    timerSeconds--;
    if (timerSeconds <= 0) { 
      clearInterval(timerInterval); 
      endQuiz(); 
      return; 
    }
    updateTimeDisplay(); 
    updateProgress();
    saveState();
  }, 1000);
}

function updateTimeDisplay() {
  const mm = Math.floor(timerSeconds/60).toString().padStart(2,'0');
  const ss = (timerSeconds%60).toString().padStart(2,'0');
  document.getElementById('timeLeft').textContent = `${mm}:${ss}`;
}

function updateProgress() {
  const pct = ((TIME_LIMIT - timerSeconds)/TIME_LIMIT)*100;
  document.getElementById('timeProgress').style.width = pct + '%';
}

function renderMap() {
  const map = document.getElementById('map'); 
  map.innerHTML = '';
  for (let i=0; i<total; i++){
    const b = document.createElement('div');
    b.textContent = i+1;
    b.style.width = '34px';
    b.style.height = '34px';
    b.style.borderRadius = '8px';
    b.style.display = 'flex';
    b.style.alignItems = 'center';
    b.style.justifyContent = 'center';
    b.style.background = 'rgba(255,255,255,0.02)';
    b.style.fontSize = '13px';
    b.style.cursor = 'pointer';
    b.dataset.idx = i;
    b.addEventListener('click', ()=>{ jumpTo(i); });
    map.appendChild(b);
  }
  highlightMap();
}

function highlightMap() {
  const map = document.getElementById('map').children;
  for (let i=0; i<map.length; i++){
    map[i].style.opacity = i === currentIndex ? '1' : '0.6';
    map[i].style.border  = i === currentIndex ? '2px solid rgba(0,180,216,0.18)' : 'none';
  }
}

function renderQuestion() {
  const qObj = QUESTIONS[currentIndex];
  document.getElementById('qText').textContent = qObj.q;

  const choicesContainer = document.getElementById('choices'); 
  choicesContainer.innerHTML = '';

  selected = answers[currentIndex]; // restore saved selection for this question

  qObj.choices.forEach((c, i)=>{
    const div = document.createElement('div'); 
    div.textContent = c; 
    div.className = 'choice';
    if (selected === i) {
      div.classList.add('selected'); // highlight previously selected
    }
    div.addEventListener('click', ()=>selectAnswer(i));
    choicesContainer.appendChild(div);
  });

  document.getElementById('qIndex').textContent = currentIndex + 1;
  highlightMap();
}

// Select / change answer for current question
function selectAnswer(idx){
  const qObj  = QUESTIONS[currentIndex];
  const choices = document.getElementById('choices').children;

  const previous = answers[currentIndex];

  // Undo previous effect on score if existed
  if (previous !== null) {
    if (previous === qObj.answer) {
      score  -= 10;
      correct--;
    } else {
      wrong--;
    }
  }

  // Apply new answer
  answers[currentIndex] = idx;
  selected = idx;
  if (idx === qObj.answer) {
    score  += 10;
    correct++;
  } else {
    wrong++;
  }

  // Visuals
  for (let i=0; i<choices.length; i++){
    choices[i].classList.remove('selected');
  }
  choices[idx].classList.add('selected');

  saveState();
}

// Helper: get list of unanswered questions (1-based indices)
function getUnansweredQuestions() {
  const list = [];
  for (let i = 0; i < total; i++) {
    if (answers[i] === null) {
      list.push(i + 1);
    }
  }
  return list;
}

document.getElementById('nextBtn').addEventListener('click', ()=>{
  // Must answer current question first
  if (answers[currentIndex] === null) { 
    alert("Please select an answer before proceeding.");
    return;
  }

  // If we are on the last question (index = total - 1)
  if (currentIndex === total - 1) {
    const unanswered = getUnansweredQuestions();

    if (unanswered.length > 0) {
      const msg = 
        "You are about to end the quiz, but you haven't answered questions: " +
        unanswered.join(", ") +
        ".\n\nDo you still want to submit?";
      const proceed = confirm(msg);
      if (!proceed) {
        return; // stay on the last question
      }
    }
    // Either all answered, or user confirmed submission
    endQuiz();
    return;
  }

  // Normal navigation (not the last question)
  currentIndex++;
  saveState(); 
  renderQuestion(); 
});

function jumpTo(idx){ 
    currentIndex = idx; 
    renderQuestion(); 
}

function endQuiz() {
  clearInterval(timerInterval);
  const timeUsed = TIME_LIMIT - timerSeconds;
  document.getElementById('questionCard').style.display = 'none';
  document.getElementById('endBlock').style.display = 'block';
  
  document.getElementById('resultSummary').innerHTML = `
    <div style="font-size:18px;font-weight:800">Quiz Complete!</div>
    <div class="small" style="margin-top:6px">Thank you for participating. Your results have been recorded.</div>
    <div class="small">Time taken: ${Math.floor(timeUsed/60)}m ${timeUsed%60}s</div>
  `;
  sendResultsToSheet(score, timeUsed);
  clearState();
}

function sendResultsToSheet(score, timeTaken) {
  const userData = sessionStorage.getItem('userData');
  
  if (!userData) {
    console.error("User data not found. Score will not be saved."); 
    return;
  }
  
  const { username, email, phone } = JSON.parse(userData);
  
  fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ 
      username,
      email,
      phone,
      score, 
      timeTaken 
    })
  }).catch(err => console.error(err));
}
window.onload = init;
</script>
</body>
</html>
